<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bluesky Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto flex min-h-screen max-w-lg items-center justify-center p-6">
    <section class="w-full rounded-2xl border border-slate-800 bg-slate-900/90 p-6 shadow-2xl">
      <h1 class="text-xl font-semibold">Finishing Bluesky login</h1>
      <p id="status" class="mt-3 text-sm text-slate-300">Completing OAuth…</p>
    </section>
  </main>

  <script>
    const OAUTH_PENDING_STORAGE_KEY = "bluesky-popular-oauth-pending";
    const OAUTH_SESSION_STORAGE_KEY = "bluesky-popular-oauth-session";

    const statusEl = document.getElementById("status");

    if (!redirectLocalhostToLoopback()) {
      run().catch((error) => {
        console.error(error);
        statusEl.textContent = error.message || "Login failed.";
      });
    }

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const error = params.get("error");
      if (error) {
        throw new Error(params.get("error_description") || error);
      }

      const state = params.get("state");
      const code = params.get("code");
      const iss = params.get("iss");
      if (!state || !code || !iss) {
        throw new Error("Missing OAuth callback parameters.");
      }

      const pending = JSON.parse(localStorage.getItem(OAUTH_PENDING_STORAGE_KEY) || "null");
      if (!pending) {
        throw new Error("Missing saved login session.");
      }
      if (pending.state !== state) {
        throw new Error("OAuth state did not match.");
      }
      if (new URL(pending.authServerIssuer).origin !== new URL(iss).origin) {
        throw new Error("OAuth issuer did not match.");
      }

      statusEl.textContent = `Exchanging code for @${pending.handle}…`;
      const tokenResponse = await postOAuthForm(
        pending.tokenEndpoint,
        {
          grant_type: "authorization_code",
          code,
          client_id: pending.clientId,
          redirect_uri: pending.redirectUri,
          code_verifier: pending.codeVerifier,
        },
        pending
      );

      if (tokenResponse.sub !== pending.did) {
        throw new Error("Authorized DID did not match the requested account.");
      }

      localStorage.setItem(OAUTH_SESSION_STORAGE_KEY, JSON.stringify({
        did: tokenResponse.sub,
        handle: pending.handle,
        clientId: pending.clientId,
        redirectUri: pending.redirectUri,
        pdsEndpoint: pending.pdsEndpoint,
        authServerIssuer: pending.authServerIssuer,
        tokenEndpoint: pending.tokenEndpoint,
        scope: tokenResponse.scope,
        accessToken: tokenResponse.access_token,
        refreshToken: tokenResponse.refresh_token,
        dpopPublicJwk: pending.dpopPublicJwk,
        dpopPrivateJwk: pending.dpopPrivateJwk,
        authServerNonce: pending.authServerNonce || "",
        resourceServerNonce: "",
        updatedAt: Date.now(),
      }));
      localStorage.removeItem(OAUTH_PENDING_STORAGE_KEY);

      statusEl.textContent = "Login complete. Returning to the app…";
      window.location.replace(pending.appUrl || "/");
    }

    function redirectLocalhostToLoopback() {
      if (window.location.hostname !== "localhost") return false;
      const loopbackUrl = new URL(window.location.href);
      loopbackUrl.hostname = "127.0.0.1";
      window.location.replace(loopbackUrl.toString());
      return true;
    }

    function randomString(size = 32) {
      return base64UrlEncode(crypto.getRandomValues(new Uint8Array(size)));
    }

    function base64UrlEncode(input) {
      const bytes = input instanceof Uint8Array ? input : new Uint8Array(input);
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    async function sha256Base64Url(value) {
      const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(value));
      return base64UrlEncode(digest);
    }

    async function importDpopKeyPair(publicJwk, privateJwk) {
      const [publicKey, privateKey] = await Promise.all([
        crypto.subtle.importKey("jwk", publicJwk, { name: "ECDSA", namedCurve: "P-256" }, true, ["verify"]),
        crypto.subtle.importKey("jwk", privateJwk, { name: "ECDSA", namedCurve: "P-256" }, true, ["sign"]),
      ]);
      return { publicKey, privateKey };
    }

    async function createDpopProof({ url, method, nonce, publicJwk, privateJwk }) {
      const keyPair = await importDpopKeyPair(publicJwk, privateJwk);
      const header = {
        typ: "dpop+jwt",
        alg: "ES256",
        jwk: {
          kty: publicJwk.kty,
          crv: publicJwk.crv,
          x: publicJwk.x,
          y: publicJwk.y,
        },
      };
      const payload = {
        jti: randomString(24),
        htm: method.toUpperCase(),
        htu: url,
        iat: Math.floor(Date.now() / 1000),
        exp: Math.floor(Date.now() / 1000) + 300,
      };
      if (nonce) payload.nonce = nonce;

      const encodedHeader = base64UrlEncode(new TextEncoder().encode(JSON.stringify(header)));
      const encodedPayload = base64UrlEncode(new TextEncoder().encode(JSON.stringify(payload)));
      const signingInput = `${encodedHeader}.${encodedPayload}`;
      const signature = await crypto.subtle.sign(
        { name: "ECDSA", hash: "SHA-256" },
        keyPair.privateKey,
        new TextEncoder().encode(signingInput)
      );
      return `${signingInput}.${base64UrlEncode(signature)}`;
    }

    async function oauthRequest(url, options, authState) {
      let nonce = authState.authServerNonce || "";

      for (let attempt = 0; attempt < 2; attempt += 1) {
        const dpop = await createDpopProof({
          url,
          method: options.method || "POST",
          nonce,
          publicJwk: authState.dpopPublicJwk,
          privateJwk: authState.dpopPrivateJwk,
        });

        const response = await fetch(url, {
          ...options,
          headers: {
            ...(options.headers || {}),
            DPoP: dpop,
          },
        });

        const nextNonce = response.headers.get("DPoP-Nonce");
        if (nextNonce) authState.authServerNonce = nextNonce;

        if (response.ok) {
          return response.json();
        }

        const errorBody = await response.json().catch(() => ({}));
        if (errorBody?.error === "use_dpop_nonce" && nextNonce && attempt === 0) {
          nonce = nextNonce;
          continue;
        }

        throw new Error(errorBody?.error_description || errorBody?.error || "OAuth request failed.");
      }

      throw new Error("OAuth request failed.");
    }

    async function postOAuthForm(url, params, authState) {
      return oauthRequest(url, {
        method: "POST",
        body: new URLSearchParams(params).toString(),
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
        },
      }, authState);
    }
  </script>
</body>

</html>
